spring:
  application:
    name: LearnForge API
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/learnforge}

server:
  port: ${PORT:8080}

app:
  name: ${APP_NAME:LearnForge API}
  api-base-path: /api
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
