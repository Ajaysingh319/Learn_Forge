spring:
  application:
    name: LearnForge API
  config:
    import: optional:file:.env[.properties]
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/learnforge}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER:https://example.auth0.com/}

server:
  port: ${PORT:8080}

app:
  name: ${APP_NAME:LearnForge API}
  api-base-path: /api
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

auth0:
  issuer: ${AUTH0_ISSUER:https://example.auth0.com/}
  audience: ${AUTH0_AUDIENCE:https://learnforge-api}

ai:
  provider: ${AI_PROVIDER:template}
  max-retries: ${AI_MAX_RETRIES:2}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1/chat/completions}
    temperature: ${OPENAI_TEMPERATURE:0.3}

youtube:
  api-key: ${YOUTUBE_API_KEY:}
  base-url: ${YOUTUBE_BASE_URL:https://www.googleapis.com/youtube/v3/search}
  max-results: ${YOUTUBE_MAX_RESULTS:3}
  cache-ttl-seconds: ${YOUTUBE_CACHE_TTL_SECONDS:600}

gemini:
  api-key: ${GEMINI_API_KEY:}
  text-model: ${GEMINI_TEXT_MODEL:gemini-2.5-flash}
  tts-model: ${GEMINI_TTS_MODEL:gemini-2.5-flash-preview-tts}
  tts-voice-name: ${GEMINI_TTS_VOICE_NAME:Kore}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
