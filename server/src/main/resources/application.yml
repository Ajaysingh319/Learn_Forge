spring:
  application:
    name: LearnForge API
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/learnforge}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER:https://example.auth0.com/}

server:
  port: ${PORT:8080}

app:
  name: ${APP_NAME:LearnForge API}
  api-base-path: /api
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

auth0:
  issuer: ${AUTH0_ISSUER:https://example.auth0.com/}
  audience: ${AUTH0_AUDIENCE:https://learnforge-api}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
