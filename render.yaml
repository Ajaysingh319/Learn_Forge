services:
  - type: web
    name: learnforge-api
    runtime: docker
    rootDir: server
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "8080"
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: AI_PROVIDER
        value: template
      - key: MONGO_URI
        sync: false
      - key: AUTH0_ISSUER
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
